set_mode:
  name: Set zone mode
  description: Change le mode global d'une zone (auto / off / boost).
  fields:
    zone_id:
      name: Zone ID
      description: ID interne de la zone (visible dans les attributs de l'entité sensor d'état).
      required: true
      example: rdc
      selector:
        text:
    mode:
      name: Mode
      description: Mode global de la zone.
      required: true
      example: auto
      selector:
        select:
          options:
            - auto
            - "off"
            - boost

force_off:
  name: Force off
  description: Force la zone en mode OFF (coupe la clim et empêche la reprise auto).
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:

reset_override:
  name: Reset override
  description: Court-circuite l'override manuel en cours et rend la main à l'auto.
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:

boost:
  name: Boost
  description: Active le mode boost pendant 15 minutes (consigne forte + ventilo 4 + swing direct).
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:

force_start:
  name: Démarrer maintenant
  description: Démarre un cycle (cool ou heat) sans attendre le franchissement du seuil.
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:
    direction:
      name: Direction
      required: true
      selector:
        select:
          options:
            - cool
            - heat

update_profiles:
  name: Mettre à jour les profils
  description: Remplace la cascade des profils d'une zone.
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:
    profiles:
      name: Profils
      description: Liste des profils (cascade).
      required: true
      selector:
        object:

reload_zones:
  name: Reload zones
  description: Recharge la configuration des zones sans redémarrer Home Assistant.

start_session:
  name: Démarrer une session
  description: Lance une session manuelle (cool ou heat) avec params libres.
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:
    mode:
      name: Mode
      required: true
      selector:
        select:
          options:
            - cool
            - heat
    target:
      name: Cible (°C)
      required: true
      selector:
        number:
          min: 16
          max: 32
          step: 0.5
          unit_of_measurement: "°C"
    max_end_ts:
      name: Fin maximale (epoch s)
      required: true
      selector:
        text:
    power:
      name: Puissance
      required: false
      selector:
        select:
          options: [doux, normal, agressif]
    fan_intensity:
      name: Ventilation
      required: false
      selector:
        select:
          options: [doux, normal, fort]
    target_cutoff:
      name: Cible de coupure (°C, optionnel)
      required: false
      selector:
        number:
          min: 16
          max: 32
          step: 0.5
          unit_of_measurement: "°C"
    parent_profile_name:
      name: Profil parent (audit)
      required: false
      selector:
        text:

update_session:
  name: Mettre à jour la session active
  description: Modifie les paramètres de la session en cours.
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:
    target:
      name: Cible (°C)
      required: false
      selector:
        number:
          min: 16
          max: 32
          step: 0.5
          unit_of_measurement: "°C"
    target_cutoff:
      name: Cible de coupure (°C — null pour effacer)
      required: false
      selector:
        number:
          min: 16
          max: 32
          step: 0.5
          unit_of_measurement: "°C"
    power:
      name: Puissance
      required: false
      selector:
        select:
          options: [doux, normal, agressif]
    fan_intensity:
      name: Ventilation
      required: false
      selector:
        select:
          options: [doux, normal, fort]
    max_end_ts:
      name: Fin maximale (epoch s)
      required: false
      selector:
        text:

extend_session:
  name: Prolonger la session
  description: Idempotent — ajoute des heures au max_end_ts de la session active.
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:
    hours:
      name: Heures à ajouter
      required: false
      selector:
        number:
          min: 0.25
          max: 8
          step: 0.25

cancel_session:
  name: Annuler la session
  description: Termine immédiatement la session en cours.
  fields:
    zone_id:
      name: Zone ID
      required: true
      selector:
        text:
